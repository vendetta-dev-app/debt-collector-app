  createManager(input: CreateManagerInput!): CreateManagerPayload
  updateManager(input: UpdateManagerInput!): UpdateManagerPayload
  createCollector(input: CreateCollectorInput!): CreateCollectorPayload
  updateCollector(input: UpdateCollectorInput!): UpdateCollectorPayload
  createClient(input: CreateClientInput!): CreateClientPayload
